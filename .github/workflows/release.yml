name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_args: --mac
            artifact_name: dmg-installer
            artifact_path: release/*.dmg

          - os: windows-latest
            build_args: --win
            artifact_name: exe-installer
            artifact_path: release/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Build Electron package
        run: npx electron-builder ${{ matrix.build_args }} --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List release output
        shell: bash
        run: |
          ls -la release/ 2>/dev/null || echo "WARNING - release directory not found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    needs: build
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: dmg-installer
          path: dmg-installer
        continue-on-error: true

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: exe-installer
          path: exe-installer
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dmg-installer/*
            exe-installer/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
